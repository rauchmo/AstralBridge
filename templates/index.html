<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AstralBridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Header ---- */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1em; color: #f0f6fc; font-weight: 600; }
    .status-row { display: flex; gap: 8px; margin-left: auto; align-items: center; }
    .pill { padding: 3px 10px; border-radius: 12px; font-size: 0.78em; font-weight: 600; white-space: nowrap; }
    .pill.ok  { background: #1a3a24; color: #56d364; border: 1px solid #2ea043; }
    .pill.err { background: #3d1a1a; color: #f85149; border: 1px solid #8b1a1a; }
    .pill.dim { background: #21262d; color: #8b949e; border: 1px solid #30363d; }

    /* ---- Layout ---- */
    .layout {
      display: grid;
      grid-template-columns: 1fr 340px 300px;
      flex: 1;
      min-height: 0;
    }

    /* ---- Panel shared ---- */
    .panel { display: flex; flex-direction: column; border-right: 1px solid #30363d; min-height: 0; }
    .panel-title {
      padding: 7px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 0.75em; font-weight: 700; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }

    /* ---- Log panel ---- */
    #log-output {
      flex: 1; overflow-y: auto;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.8em; padding: 4px 0;
    }
    .log-entry { display: flex; gap: 8px; padding: 1px 14px; line-height: 1.7; }
    .log-entry:hover { background: #161b22; }
    .log-ts  { color: #484f58; flex-shrink: 0; }
    .log-lvl { flex-shrink: 0; width: 46px; font-weight: 600; }
    .log-lvl.info  { color: #58a6ff; }
    .log-lvl.warn  { color: #e3b341; }
    .log-lvl.error { color: #f85149; }
    .log-lvl.ddb   { color: #3fb950; }
    .log-msg { word-break: break-all; }

    /* ---- Rolls panel ---- */
    #roll-list { flex: 1; overflow-y: auto; }

    .roll-item {
      padding: 8px 14px;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      transition: background 0.1s;
    }
    .roll-item:hover { background: #161b22; }
    .roll-item.active { background: #1c2a3a; border-left: 2px solid #58a6ff; padding-left: 12px; }

    .roll-item-header { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
    .roll-char { font-weight: 600; font-size: 0.9em; color: #f0f6fc; }
    .roll-total { font-size: 1.1em; font-weight: 700; color: #58a6ff; }
    .roll-action { font-size: 0.78em; color: #8b949e; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .roll-type-badge {
      font-size: 0.68em; border-radius: 3px; padding: 1px 5px;
      font-weight: 600; flex-shrink: 0;
    }
    .roll-type-badge.attack   { background: #3d1a1a; color: #f85149; }
    .roll-type-badge.damage   { background: #3d2a1a; color: #e3a84b; }
    .roll-type-badge.check    { background: #1a3a24; color: #56d364; }
    .roll-type-badge.save     { background: #1a2a3d; color: #58a6ff; }
    .roll-type-badge.initiative { background: #2a1a3d; color: #bc8cff; }
    .roll-type-badge.other    { background: #21262d; color: #8b949e; }

    /* ---- Sidebar ---- */
    .sidebar { overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; border-right: none; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 14px; }
    .card h3 { font-size: 0.72em; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
    .form-group { margin-bottom: 10px; }
    .form-group:last-of-type { margin-bottom: 0; }
    label { display: flex; justify-content: space-between; font-size: 0.8em; color: #8b949e; margin-bottom: 4px; }
    label button { background: none; border: none; color: #58a6ff; cursor: pointer; font-size: 1em; padding: 0; }
    input[type="text"], input[type="password"] {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      color: #c9d1d9; padding: 5px 8px; border-radius: 4px;
      font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 0.8em;
    }
    input:focus { outline: none; border-color: #58a6ff; }
    .btn { display: block; width: 100%; padding: 7px; border-radius: 5px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 0.85em; margin-top: 8px; text-align: center; }
    .btn:hover { background: #30363d; }
    .btn.primary { background: #1f6feb; border-color: #388bfd; color: #fff; }
    .btn.primary:hover { background: #388bfd; }
    .btn.danger  { background: #3d1a1a; border-color: #8b1a1a; color: #f85149; }
    .btn.danger:hover  { background: #5a2020; }
    .btn.small { margin-top: 0; padding: 4px 8px; width: auto; display: inline-block; font-size: 0.78em; }

    /* ---- Modal ---- */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      width: 780px; max-width: 95vw; max-height: 88vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      padding: 14px 18px; background: #1c2128; border-bottom: 1px solid #30363d;
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-header h2 { font-size: 1em; color: #f0f6fc; }
    .modal-close { background: none; border: none; color: #8b949e; font-size: 1.4em; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: #f0f6fc; }

    .modal-body { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 16px; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .detail-card { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; }
    .detail-card h4 { font-size: 0.72em; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

    .detail-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; padding: 3px 0; border-bottom: 1px solid #21262d; font-size: 0.85em; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #8b949e; flex-shrink: 0; }
    .detail-value { color: #f0f6fc; font-family: 'Cascadia Code', monospace; font-size: 0.9em; text-align: right; word-break: break-all; }

    .dice-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .die-chip {
      background: #1c2a3a; border: 1px solid #2d4a6a;
      border-radius: 4px; padding: 3px 8px;
      font-family: monospace; font-size: 0.85em; color: #58a6ff;
    }

    .json-section h4 { font-size: 0.72em; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .json-section summary { cursor: pointer; color: #8b949e; font-size: 0.85em; padding: 4px 0; }
    .json-section summary:hover { color: #c9d1d9; }
    pre.json-viewer {
      background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
      padding: 12px; font-size: 0.78em; overflow-x: auto;
      color: #c9d1d9; line-height: 1.5; margin-top: 6px;
      white-space: pre-wrap; word-break: break-all;
    }

    /* ---- Toast ---- */
    #toast { position: fixed; bottom: 20px; right: 20px; background: #1a3a24; color: #56d364; border: 1px solid #2ea043; border-radius: 6px; padding: 8px 16px; font-size: 0.85em; display: none; z-index: 300; }
    #toast.err { background: #3d1a1a; color: #f85149; border-color: #8b1a1a; }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.3em">🎲</span>
  <h1>AstralBridge</h1>
  <div class="status-row">
    <span id="pill-ddb"     class="pill err">DDB: Disconnected</span>
    <span id="pill-foundry" class="pill dim">Foundry: 0 clients</span>
  </div>
</header>

<div class="layout">

  <!-- Log panel -->
  <div class="panel">
    <div class="panel-title">
      Live Log
      <button class="btn small" onclick="clearLogs()">Clear</button>
      <span id="log-persist-hint" style="font-size:0.75em; color:#484f58; text-transform:none; letter-spacing:0;">persisted</span>
    </div>
    <div id="log-output"></div>
  </div>

  <!-- Rolls panel -->
  <div class="panel">
    <div class="panel-title">
      Recent Rolls
      <div style="display:flex; gap:6px; align-items:center;">
        <span id="roll-count" style="color:#484f58; font-size:0.9em; text-transform:none; letter-spacing:0;">0 rolls</span>
        <button class="btn small" onclick="clearRolls()">Clear</button>
      </div>
    </div>
    <div id="roll-list"></div>
  </div>

  <!-- Config sidebar -->
  <div class="sidebar">

    <div class="card">
      <h3>Roll Statistics</h3>
      <div id="stats-body" style="font-size:0.82em; color:#8b949e;">No rolls yet.</div>
    </div>

    <div class="card">
      <h3>Connection</h3>
      <button class="btn danger" onclick="restartDDB()">↺ Restart DDB Connection</button>
    </div>

    <div class="card">
      <h3>Campaign</h3>
      <div class="form-group">
        <label>Game ID</label>
        <div style="display:flex; gap:6px;">
          <input type="text" id="quick-game-id" placeholder="e.g. 6572636" style="flex:1;">
          <button class="btn primary" onclick="switchGameId()">Switch</button>
        </div>
        <div style="font-size:0.78em; color:#8b949e; margin-top:4px;">
          Enter your DDB Campaign/Game ID and click Switch to reconnect.
        </div>
      </div>
    </div>

    <div class="card">
      <h3>D&D Beyond Config</h3>
      <div class="form-group">
        <label>Cobalt Session Token <button onclick="togglePw('cobalt-token', this)">Show</button></label>
        <input type="password" id="cobalt-token" placeholder="eyJ...">
      </div>
      <div class="form-group">
        <label>Game ID</label>
        <input type="text" id="game-id" placeholder="6572636">
      </div>
      <div class="form-group">
        <label>User ID</label>
        <input type="text" id="user-id" placeholder="100435237">
      </div>
      <button class="btn" onclick="saveConfig(false)">Save</button>
      <button class="btn primary" onclick="saveConfig(true)">Save &amp; Restart</button>
    </div>

  </div>
</div>

<!-- Detail Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Roll Detail</h2>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn small primary" id="resend-btn" onclick="resendRoll()">↺ Resend to Foundry</button>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ---- Status polling ----
  async function updateStatus() {
    try {
      const { ddb_connected, foundry_clients } = await fetch("/api/status").then(r => r.json());
      const ddb = document.getElementById("pill-ddb");
      ddb.textContent = `DDB: ${ddb_connected ? "Connected" : "Disconnected"}`;
      ddb.className = `pill ${ddb_connected ? "ok" : "err"}`;
      const fc = document.getElementById("pill-foundry");
      fc.textContent = `Foundry: ${foundry_clients} client${foundry_clients !== 1 ? "s" : ""}`;
      fc.className = `pill ${foundry_clients > 0 ? "ok" : "dim"}`;
    } catch {}
  }
  setInterval(updateStatus, 2000);
  updateStatus();

  // ---- Logs ----
  const logOutput = document.getElementById("log-output");
  let autoScroll = true;
  logOutput.addEventListener("scroll", () => {
    autoScroll = logOutput.scrollHeight - logOutput.scrollTop - logOutput.clientHeight < 40;
  });

  function appendLog(e) {
    if (e.level === "ddb" && e.roll_summary) return; // shown in rolls panel instead
    const div = document.createElement("div");
    div.className = "log-entry";
    div.innerHTML =
      `<span class="log-ts">${e.ts}</span>` +
      `<span class="log-lvl ${e.level}">${e.level.toUpperCase()}</span>` +
      `<span class="log-msg">${esc(e.msg)}</span>`;
    logOutput.appendChild(div);
    if (autoScroll) logOutput.scrollTop = logOutput.scrollHeight;
  }

  async function clearLogs() {
    await fetch("/api/logs", { method: "DELETE" });
    logOutput.innerHTML = "";
  }

  async function clearRolls() {
    await fetch("/api/rolls", { method: "DELETE" });
    rolls = [];
    activeRollId = null;
    renderRolls();
    toast("Roll history cleared.");
  }
  function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function now() { return new Date().toLocaleTimeString("de-DE"); }

  const evtSource = new EventSource("/api/logs/stream");
  evtSource.onmessage = e => {
    const data = JSON.parse(e.data);
    appendLog(data);
    if (data.level === "ddb" && data.roll_summary) {
      prependRoll(data.roll_summary);
    }
  };
  evtSource.onerror = () => appendLog({ ts: now(), level: "warn", msg: "SSE reconnecting..." });

  // ---- Rolls list ----
  let rolls = [];
  let activeRollId = null;

  async function loadRolls() {
    rolls = await fetch("/api/rolls").then(r => r.json());
    renderRolls();
  }

  function prependRoll(summary) {
    rolls.unshift(summary);
    if (rolls.length > 100) rolls.pop();
    renderRolls();
  }

  function rollTypeClass(rt) {
    const t = (rt || "").toLowerCase();
    if (t === "to hit" || t === "attack") return "attack";
    if (t === "damage") return "damage";
    if (t === "save") return "save";
    if (t === "check") return "check";
    if (t === "initiative") return "initiative";
    return "other";
  }

  function renderStats() {
    const el = document.getElementById("stats-body");
    if (!rolls.length) { el.innerHTML = "No rolls yet."; return; }

    // Per-character aggregation
    const chars = {};
    for (const r of rolls) {
      const c = r.character || "Unknown";
      if (!chars[c]) chars[c] = { totals: [], nat20: 0, nat1: 0 };
      const s = chars[c];
      // Only count d20 rolls for avg/nat tracking
      const d20 = (r.dice || []).filter(d => d.faces === 20);
      if (d20.length) {
        s.totals.push(r.total);
        if (d20.some(d => d.result === 20)) s.nat20++;
        if (d20.some(d => d.result === 1))  s.nat1++;
      }
    }

    el.innerHTML = Object.entries(chars).map(([name, s]) => {
      const avg = s.totals.length ? (s.totals.reduce((a, b) => a + b, 0) / s.totals.length).toFixed(1) : "—";
      return `<div style="margin-bottom:10px;">
        <div style="color:#c9d1d9; font-weight:600; margin-bottom:3px;">${esc(name)}</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <span title="Nat 20s">🎯 ${s.nat20}</span>
          <span title="Nat 1s">💀 ${s.nat1}</span>
          <span title="Average d20 total">Ø ${avg}</span>
          <span title="Total d20 rolls" style="color:#484f58;">${s.totals.length} rolls</span>
        </div>
      </div>`;
    }).join("");
  }

  function renderRolls() {
    renderStats();
    const list = document.getElementById("roll-list");
    document.getElementById("roll-count").textContent = `${rolls.length} roll${rolls.length !== 1 ? "s" : ""}`;
    list.innerHTML = rolls.map(r => {
      const tc = rollTypeClass(r.rollType);
      const active = r.id === activeRollId ? " active" : "";
      return `<div class="roll-item${active}" onclick="openRoll('${esc(r.id)}')">
        <div class="roll-item-header">
          <span class="roll-char">${esc(r.character)}</span>
          <span class="roll-total">${r.total}</span>
        </div>
        <div class="roll-item-header" style="margin-top:3px;">
          <span class="roll-action">${esc(r.action)}</span>
          <span class="roll-type-badge ${tc}">${esc(r.rollType)}</span>
        </div>
        <div style="font-size:0.72em; color:#484f58; margin-top:2px;">${r.ts}</div>
      </div>`;
    }).join("");
  }

  // ---- Modal ----
  async function openRoll(id) {
    activeRollId = id;
    renderRolls();

    const detail = await fetch(`/api/rolls/${encodeURIComponent(id)}`).then(r => r.json());
    const body = document.getElementById("modal-body");
    document.getElementById("modal-title").textContent =
      `${detail.character} — ${detail.action} (${detail.rollType})`;

    const diceHtml = (detail.dice || []).length
      ? detail.dice.map(d => `<span class="die-chip">d${d.faces}: <strong>${d.result}</strong></span>`).join("")
      : "<span style='color:#484f58'>—</span>";

    body.innerHTML = `
      <div class="detail-grid">
        <div class="detail-card">
          <h4>Character</h4>
          <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${esc(detail.character)}</span></div>
          <div class="detail-row"><span class="detail-label">Entity ID</span><span class="detail-value">${esc(detail.entity_id || "—")}</span></div>
          <div class="detail-row"><span class="detail-label">Entity Type</span><span class="detail-value">${esc(detail.entity_type || "—")}</span></div>
          <div class="detail-row"><span class="detail-label">Game ID</span><span class="detail-value">${esc(detail.game_id || "—")}</span></div>
          <div class="detail-row"><span class="detail-label">Roll ID</span><span class="detail-value" style="font-size:0.75em">${esc(detail.id)}</span></div>
        </div>
        <div class="detail-card">
          <h4>Roll</h4>
          <div class="detail-row"><span class="detail-label">Action</span><span class="detail-value">${esc(detail.action)}</span></div>
          <div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${esc(detail.rollType)}</span></div>
          <div class="detail-row"><span class="detail-label">Total</span><span class="detail-value" style="font-size:1.2em; color:#58a6ff;">${detail.total}</span></div>
          <div class="detail-row"><span class="detail-label">Breakdown</span><span class="detail-value">${esc(detail.text)}</span></div>
          <div class="detail-row"><span class="detail-label">Modifier</span><span class="detail-value">${detail.constant >= 0 ? "+" : ""}${detail.constant}</span></div>
          <div class="detail-row" style="flex-direction:column; align-items:flex-start; gap:6px;">
            <span class="detail-label">Dice</span>
            <div class="dice-list">${diceHtml}</div>
          </div>
        </div>
      </div>

      <div class="json-section">
        <details>
          <summary>▶ Raw DDB JSON</summary>
          <pre class="json-viewer">${esc(JSON.stringify(detail.raw, null, 2))}</pre>
        </details>
      </div>`;

    document.getElementById("modal-backdrop").classList.add("open");
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById("modal-backdrop")) return;
    document.getElementById("modal-backdrop").classList.remove("open");
  }

  async function resendRoll() {
    if (!activeRollId) return;
    const btn = document.getElementById("resend-btn");
    btn.disabled = true;
    btn.textContent = "Sending...";
    try {
      const res = await fetch(`/api/rolls/${encodeURIComponent(activeRollId)}/resend`, { method: "POST" });
      if (res.ok) toast("Roll resent to Foundry!");
      else toast("Resend failed.", true);
    } catch { toast("Resend failed.", true); }
    btn.disabled = false;
    btn.textContent = "↺ Resend to Foundry";
  }

  // ---- Campaign switcher ----
  function switchGameId() {
    const id = document.getElementById("quick-game-id").value.trim();
    if (!id) { toast("Please enter a Game ID.", true); return; }
    document.getElementById("game-id").value = id;
    saveConfig(true);
  }

  // ---- Config ----
  async function loadConfig() {
    const cfg = await fetch("/api/config").then(r => r.json());
    document.getElementById("cobalt-token").value = cfg.DDB_COBALT_TOKEN;
    document.getElementById("game-id").value       = cfg.DDB_GAME_ID;
    document.getElementById("user-id").value       = cfg.DDB_USER_ID;
  }

  async function saveConfig(andRestart) {
    const body = {
      DDB_COBALT_TOKEN: document.getElementById("cobalt-token").value,
      DDB_GAME_ID:      document.getElementById("game-id").value,
      DDB_USER_ID:      document.getElementById("user-id").value,
    };
    const res = await fetch("/api/config", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (res.ok) { toast("Configuration saved!"); if (andRestart) await restartDDB(); }
    else toast("Save failed.", true);
  }

  async function restartDDB() {
    await fetch("/api/restart", { method: "POST" });
    toast("DDB connection restarting...");
  }

  function togglePw(id, btn) {
    const el = document.getElementById(id);
    const show = el.type === "password";
    el.type = show ? "text" : "password";
    btn.textContent = show ? "Hide" : "Show";
  }

  function toast(msg, err = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = err ? "err" : "";
    t.style.display = "block";
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.display = "none", 2500);
  }

  // Keyboard: Escape closes modal
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") document.getElementById("modal-backdrop").classList.remove("open");
  });

  loadConfig();
  loadRolls();
